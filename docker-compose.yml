version: '3.8'

services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: ib-gateway
    restart: unless-stopped
    ports:
      - "4002:4003"
      - "5900:5900"
    environment:
      - TWS_USERID=${IBKR_LIVE_USER}
      - TWS_PASSWORD=${IBKR_LIVE_PASS}
      - TRADING_MODE=live
      - READ_ONLY_API=no
      - AUTO_LOGOFF=no
      - BYPASS_WARNING_MESSAGES=yes
      - VNC_SERVER_PASSWORD=${VNC_SERVER_PASSWORD}
      - TWOFA_DEVICE=IB Key
      - TWOFA_TOTP_SECRET=${IBKR_TOTP_SECRET}
    shm_size: '1gb'
    networks:
      - trading_bridge

  execution-agent:
    image: ghcr.io/arnabbiswas1510/ai-trading-bot-execution-agent:latest
    container_name: execution-agent
    restart: unless-stopped
    depends_on:
      - ib-gateway
    env_file:
      - .env
    environment:
      - IB_GATEWAY_HOST=ib-gateway
      - IB_GATEWAY_PORT=4003
    volumes:
      - /home/dietpi/docker/ai-trading-bot/logs:/app/logs   # host path — survives container recreations
    logging:
      driver: json-file
      options:
        max-size: "10m"   # Docker json-file capped for live `docker logs` tailing
        max-file: "3"
    networks:
      - trading_bridge

  trading-bot:
    image: ghcr.io/arnabbiswas1510/ai-trading-bot:latest
    container_name: can-slim-trading-bot
    ports:
      - "8000:8000"
    volumes:
      - bot-data:/app/data
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/trading_bot.db
    networks:
      - trading_bridge

networks:
  trading_bridge:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400

volumes:
  bot-data:
    driver: local

