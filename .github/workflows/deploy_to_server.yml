name: Deploy to Production Server

on:
  workflow_run:
    workflows: ["Build and Push Docker Images to GHCR"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy new images to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 2222
          timeout: 120s
          script: |
            cd /home/dietpi/docker/ai-trading-bot

            echo "=== Pulling latest repository code ==="
            git fetch --all
            git reset --hard origin/main

            echo "=== Pulling latest images ==="
            docker compose pull execution-agent trading-bot

            echo "=== Removing old container instances to prevent name conflicts ==="
            docker compose rm -fs execution-agent trading-bot

            echo "=== Starting ib-gateway only if not already running (--no-recreate prevents 2FA disruption) ==="
            docker compose up -d --no-recreate ib-gateway > /dev/null 2>&1
            sleep 5
            docker compose up -d execution-agent trading-bot > /dev/null 2>&1

            echo "=== Pruning log files older than 7 days ==="
            # Belt-and-suspenders: TeeLogger purges on startup too, but this
            # guarantees cleanup even if the container crashed before that ran.
            find /home/dietpi/docker/ai-trading-bot/logs \
              -maxdepth 1 \
              -name "execution_*.log" \
              -mtime +7 \
              -print \
              -delete \
              2>/dev/null || true

            echo "=== Deployment complete ==="
            docker inspect ib-gateway       --format 'ib-gateway:       {{.State.Status}} (restarts: {{.RestartCount}})'
            docker inspect execution-agent  --format 'execution-agent:  {{.State.Status}} (restarts: {{.RestartCount}})'
            docker inspect can-slim-trading-bot --format 'can-slim-trading-bot: {{.State.Status}} (restarts: {{.RestartCount}})'
            exit 0
