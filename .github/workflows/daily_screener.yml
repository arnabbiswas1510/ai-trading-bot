name: Daily CANSLIM Trading Bot Screener

on:
  schedule:
    - cron: '0 22 * * 1-5' # Mon-Fri at 22:00 UTC (6:00 PM EST)
  workflow_dispatch:

jobs:
  run-screeners:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set Up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Unit Tests
      run: pytest tests/ -v --tb=short -q > pytest_output.txt || (cat pytest_output.txt && exit 1)
      env:
        # Tests run offline with mocks — no real credentials needed
        FMP_API_KEY: "test_key"
        SUPABASE_URL: "https://test.supabase.co"
        SUPABASE_KEY: "test_key"

    - name: Upload Test Output
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-output
        path: pytest_output.txt

    - name: Execute TradingView Fundamental Screener
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python tv_api_screener.py

    - name: Execute Technical Filter
      env:
        FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python technical_screener.py


