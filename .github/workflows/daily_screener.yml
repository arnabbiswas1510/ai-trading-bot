name: Daily CANSLIM Trading Bot Screener

on:
  schedule:
    - cron: '0 22 * * 1-5' # Mon-Fri at 22:00 UTC (6:00 PM EST)
  workflow_dispatch:

jobs:
  run-screeners:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set Up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Unit Tests
      run: pytest tests/ -v --tb=short -q > pytest_output.txt || (cat pytest_output.txt && exit 1)
      env:
        # Tests run offline with mocks — no real credentials needed
        FMP_API_KEY: "test_key"
        SUPABASE_URL: "https://test.supabase.co"
        SUPABASE_KEY: "test_key"

    - name: Upload Test Output
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-output
        path: pytest_output.txt

    - name: Execute TradingView Fundamental Screener
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python tv_api_screener.py

    - name: Execute Technical Filter
      env:
        FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
      run: python technical_screener.py

    - name: Execute AI Evaluator
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python ai_evaluator.py

    - name: Sync IBKR Cash Flows (Flex Query)
      # Fetches deposits/withdrawals from IBKR and upserts into Supabase cash_flows table.
      # Used by the performance report UI to exclude deposits from return calculations.
      # Also checks token expiry and sends a Telegram warning 30 days before expiry.
      env:
        IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
        IBKR_FLEX_QUERY_ID: ${{ secrets.IBKR_FLEX_QUERY_ID }}
        IBKR_FLEX_TOKEN_EXPIRY: ${{ secrets.IBKR_FLEX_TOKEN_EXPIRY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
      run: python flex_query_sync.py
