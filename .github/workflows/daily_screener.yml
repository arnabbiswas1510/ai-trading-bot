name: Daily CANSLIM Trading Bot Screener

on:
  schedule:
    - cron: '0 21 * * 1-5' # Mon-Fri at 21:00 UTC (5:00 PM EDT) — actual run ~6:00 PM EDT after GH Actions queue delay
  workflow_dispatch:

jobs:
  run-screeners:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set Up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Unit Tests
      run: |
        python -m pytest tests/ -v --tb=short
      env:
        # Tests run offline with mocks — no real credentials needed
        FMP_API_KEY: "test_key"
        SUPABASE_URL: "https://test.supabase.co"
        SUPABASE_KEY: "test_key"

    - name: Execute TradingView Fundamental Screener
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python tv_api_screener.py

    - name: Execute Technical Filter
      env:
        FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
      run: python technical_screener.py

    - name: Execute AI Evaluator
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python ai_evaluator.py


    - name: Notify on Failure
      if: failure()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
      run: |
        python - <<'EOF'
        import os, requests
        token = os.environ["TELEGRAM_BOT_TOKEN"]
        chat_ids = os.environ["TELEGRAM_CHAT_IDS"].split(",")
        run_url = f"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        msg = (
            f"❌ *Daily Screener FAILED*\n"
            f"Job: `${{ github.job }}`\n"
            f"Workflow: `${{ github.workflow }}`\n"
            f"[View run]({run_url})"
        )
        for chat_id in chat_ids:
            requests.post(
                f"https://api.telegram.org/bot{token}/sendMessage",
                json={"chat_id": chat_id.strip(), "text": msg, "parse_mode": "Markdown"},
                timeout=10,
            )
        print("Failure notification sent.")
        EOF
