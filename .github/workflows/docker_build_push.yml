name: Build and Push Docker Images to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase repository owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and push Execution Agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/ai-trading-bot-execution-agent:latest
          # Pass commit SHA so execution agent logs always show the deployed version
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Trading Bot Web App
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/ai-trading-bot:latest
          # GIT_COMMIT changes every push → busts the GHA layer cache for the
          # `npm run build` step, preventing stale frontend bundles from being
          # reused. BUILD_TIME surfaces in /api/version for deployment tracing.
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          # Cache everything EXCEPT the frontend build layer (frontend-builder stage).
          # `no-cache-filter` targets the stage name defined in the Dockerfile.
          no-cache-filters: frontend-builder
          cache-from: type=gha
          cache-to: type=gha,mode=max
